version: 2
updates:
  # Bun dependencies (root + all packages)
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      production:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    open-pull-requests-limit: 10

  # GitHub Actions versions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      actions:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    cooldown:
      default-days: 7
