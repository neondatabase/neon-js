version: 2
updates:
  - package-ecosystem: npm
    directories:
      - /
      - /packages/*
      - /examples/*
      - /e2e
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      better-auth:
        patterns:
          - "better-auth"
          - "@better-auth/*"
      minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
