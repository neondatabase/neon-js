name: Unit Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  unit-tests:
    timeout-minutes: 15
    runs-on:
      group: neondatabase-protected-runner-group
      labels: linux-ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Setup JFrog CLI with OIDC
        uses: jfrog/setup-jfrog-cli@5a4fbe1e30dbb570cc62d2513421c4b9bc3c9959 # v4
        env:
          JF_URL: https://databricks.jfrog.io
        with:
          oidc-provider-name: github-actions

      - name: Configure JFrog npm proxy for Bun
        run: |
          JFROG_AUTH_TOKEN=$(jf config export setup-jfrog-cli-server | base64 -d | jq -r '.accessToken')
          echo "JFROG_AUTH_TOKEN=$JFROG_AUTH_TOKEN" >> "$GITHUB_ENV"
          echo "registry=https://databricks.jfrog.io/artifactory/api/npm/db-npm/" > .npmrc
          echo "//databricks.jfrog.io/artifactory/api/npm/db-npm/:_authToken=${JFROG_AUTH_TOKEN}" >> .npmrc

      - name: Cache bun store
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Restore build cache
        id: build-cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            packages/internal/dist
            packages/postgrest-js/dist
            packages/auth-ui/dist
            packages/auth/dist
            packages/neon-js/dist
          key: build-${{ runner.os }}-${{ hashFiles('packages/*/src/**', 'packages/*/tsdown.config.ts', 'build/**', 'tsconfig.json') }}
          restore-keys: |
            build-${{ runner.os }}-

      - name: Build packages
        if: steps.build-cache.outputs.cache-hit != 'true'
        run: bun run build

      # Run unit tests using vitest
      # Note: Uses `bun run test:ci` which runs `vitest run` for each package
      # The CSS build tests in auth-ui require the build to complete first
      - name: Run unit tests
        run: bun run test:ci
