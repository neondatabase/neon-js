name: Build & Lint & Typecheck

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  ci:
    timeout-minutes: 15
    runs-on:
      group: neondatabase-protected-runner-group
      labels: linux-ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Setup JFrog CLI with OIDC
        uses: jfrog/setup-jfrog-cli@5a4fbe1e30dbb570cc62d2513421c4b9bc3c9959 # v4
        env:
          JF_URL: https://databricks.jfrog.io
        with:
          oidc-provider-name: github-actions

      - name: Configure JFrog npm proxy for Bun
        run: |
          JFROG_AUTH_TOKEN=$(jf config show --format=json | jq -r '.[0].accessToken')
          echo "JFROG_AUTH_TOKEN=$JFROG_AUTH_TOKEN" >> "$GITHUB_ENV"
          cat > bunfig.toml <<EOF
          [install]
          registry = { url = "https://databricks.jfrog.io/artifactory/api/npm/db-npm/", token = "$JFROG_AUTH_TOKEN" }
          EOF

      - name: Cache bun store
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache build artifacts
        id: build-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            packages/internal/dist
            packages/postgrest-js/dist
            packages/auth-ui/dist
            packages/auth/dist
            packages/neon-js/dist
          key: build-${{ runner.os }}-${{ hashFiles('packages/*/src/**', 'packages/*/tsdown.config.ts', 'build/**', 'tsconfig.json') }}

      - name: Lint
        run: bun run lint

      - name: Build
        if: steps.build-cache.outputs.cache-hit != 'true'
        run: bun run build

      - name: Typecheck
        run: bun run typecheck
