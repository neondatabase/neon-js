name: Build & Lint & Typecheck

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  ci:
    timeout-minutes: 15
    runs-on:
      group: neondatabase-protected-runner-group
      labels: linux-ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup JFrog CLI with OIDC
        id: setup-jfrog
        uses: jfrog/setup-jfrog-cli@279b1f629f43dd5bc658d8361ac4802a7ef8d2d5 # v4.9.1
        env:
          JF_URL: https://databricks.jfrog.io
        with:
          oidc-provider-name: github-actions

      - name: Configure npm registry
        run: |
          npm config set registry https://databricks.jfrog.io/artifactory/api/npm/db-npm/
          npm config set //databricks.jfrog.io/artifactory/api/npm/db-npm/:_authToken ${{ steps.setup-jfrog.outputs.oidc-token }}

      - name: Setup pnpm
        run: npm install -g pnpm@10

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'

      - name: Configure pnpm registry
        run: |
          echo "registry=https://databricks.jfrog.io/artifactory/api/npm/db-npm/" >> .npmrc
          echo "//databricks.jfrog.io/artifactory/api/npm/db-npm/:_authToken=${{ steps.setup-jfrog.outputs.oidc-token }}" >> .npmrc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache build artifacts
        id: build-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            packages/internal/dist
            packages/postgrest-js/dist
            packages/auth-ui/dist
            packages/auth/dist
            packages/neon-js/dist
          key: build-${{ runner.os }}-${{ hashFiles('packages/*/src/**', 'packages/*/tsdown.config.ts', 'build/**', 'tsconfig.json') }}

      - name: Lint
        run: pnpm run lint

      - name: Build
        if: steps.build-cache.outputs.cache-hit != 'true'
        run: pnpm run build

      - name: Typecheck
        run: pnpm run typecheck
