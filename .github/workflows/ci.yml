name: Build & Lint & Typecheck

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  ci:
    timeout-minutes: 15
    runs-on:
      group: neondatabase-protected-runner-group
      labels: linux-ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Install pnpm
        run: |
          curl -fsSL https://github.com/pnpm/pnpm/releases/download/v9.15.9/pnpm-linux-x64 -o /usr/local/bin/pnpm
          chmod +x /usr/local/bin/pnpm
          pnpm --version

      - name: Setup JFrog CLI with OIDC
        uses: jfrog/setup-jfrog-cli@5a4fbe1e30dbb570cc62d2513421c4b9bc3c9959 # v4
        env:
          JF_URL: https://databricks.jfrog.io
        with:
          oidc-provider-name: github-actions

      - name: Configure npm registry via JFrog
        run: |
          JFROG_TOKEN=$(jf config export setup-jfrog-cli-server | base64 -d | jq -r '.accessToken')
          echo "registry=https://databricks.jfrog.io/artifactory/api/npm/db-npm/" > ~/.npmrc
          echo "//databricks.jfrog.io/artifactory/api/npm/db-npm/:_authToken=${JFROG_TOKEN}" >> ~/.npmrc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache build artifacts
        id: build-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            packages/internal/dist
            packages/postgrest-js/dist
            packages/auth-ui/dist
            packages/auth/dist
            packages/neon-js/dist
          key: build-${{ runner.os }}-${{ hashFiles('packages/*/src/**', 'packages/*/tsdown.config.ts', 'build/**', 'tsconfig.json') }}

      - name: Lint
        run: pnpm run lint

      - name: Build
        if: steps.build-cache.outputs.cache-hit != 'true'
        run: pnpm run build

      - name: Typecheck
        run: pnpm run typecheck
