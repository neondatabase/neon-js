name: Post-release (tag + handoff)

# Fires when a prepare-release PR merges. Steps:
#   1. Parse the squash commit message
#   2. Create tags on the merge commit
#   3. Push tags
#   4. Post a comment on the merged PR with Stage 2 (npm publish) dispatch instructions
#   5. Write the same instructions to the workflow run summary
#
# No cross-repo dispatch. Stage 2 is triggered by a human from the PR comment or summary.

on:
  push:
    branches: [main]

concurrency:
  group: post-release
  cancel-in-progress: false

defaults:
  run:
    shell: bash -euo pipefail {0}

jobs:
  tag-and-handoff:
    if: "startsWith(github.event.head_commit.message, 'chore: release @neondatabase/')"
    runs-on:
      group: neondatabase-protected-runner-group
      labels: linux-ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write      # push tags
      pull-requests: write # comment on PR

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@c6295a65d1254861815972266d5933fd6e532bdf # v2.11.1
        with:
          egress-policy: audit

      - name: Diagnostic — confirm event identity
        # Logs actor + sender + ref + sha of the triggering push. On first
        # successful run, verify `actor` is a human (not `github-actions[bot]`).
        # If it IS `github-actions[bot]`, the push was caused by GITHUB_TOKEN
        # (likely auto-merge), GitHub will suppress downstream triggers, and
        # this workflow won't fire at all — meaning you never see this log.
        # If you CAN see this log, the trigger chain is healthy.
        run: |
          echo "actor:  ${{ github.actor }}"
          echo "sender: ${{ github.event.sender.login }}"
          echo "ref:    ${{ github.ref }}"
          echo "sha:    ${{ github.sha }}"
          {
            echo "### Event identity"
            echo "- **actor:** \`${{ github.actor }}\`"
            echo "- **sender:** \`${{ github.event.sender.login }}\`"
            echo "- **ref:** \`${{ github.ref }}\`"
            echo "- **sha:** \`${{ github.sha }}\`"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Parse release metadata from commit message
        id: parse
        env:
          MSG: ${{ github.event.head_commit.message }}
        run: |
          # Message shape: "chore: release @neondatabase/auth@v0.3.0 @neondatabase/neon-js@v0.3.0 (#123)"
          # Parse the SUBJECT LINE ONLY (first line of the commit message) — the squash body can
          # contain extra @neondatabase/<pkg>@v<ver> tokens from concatenated branch commit
          # subjects, which would otherwise pollute the order and duplicate tags in the handoff.
          SUBJECT=$(echo "$MSG" | head -n 1)

          TAGS='[]'
          PACKAGES='[]'
          VERSIONS='[]'
          while IFS= read -r token; do
            stripped="${token#@neondatabase/}"   # auth@v0.3.0
            pkg="${stripped%@v*}"                # auth
            ver="${stripped#*@v}"                # 0.3.0
            TAGS=$(echo "$TAGS" | jq --arg t "${pkg}@v${ver}" '. + [$t]')
            PACKAGES=$(echo "$PACKAGES" | jq --arg p "$pkg" '. + [$p]')
            VERSIONS=$(echo "$VERSIONS" | jq --arg v "$ver" '. + [$v]')
          done < <(echo "$SUBJECT" | grep -oE '@neondatabase/[a-z0-9-]+@v[0-9]+\.[0-9]+\.[0-9]+(-[a-z0-9.]+)?')

          if [[ "$(echo "$TAGS" | jq 'length')" == "0" ]]; then
            echo "No @neondatabase/* tokens found in commit subject — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # PR number is the last `(#NNN)` token in the subject (squash merges add this automatically).
          # `|| true` keeps this non-fatal under `bash -euo pipefail` when the subject has no (#N) token —
          # we still want to tag + write the summary; just skip the PR-comment step.
          PR_NUM=$(echo "$SUBJECT" | grep -oE '\(#[0-9]+\)' | tail -1 | grep -oE '[0-9]+' || true)

          # jq without -c pretty-prints with newlines, which breaks $GITHUB_OUTPUT's
          # single-line key=value format ("Invalid format" error). Compact JSON fixes it.
          echo "tags=$(echo "$TAGS" | jq -c .)" >> "$GITHUB_OUTPUT"
          echo "packages=$(echo "$PACKAGES" | jq -c .)" >> "$GITHUB_OUTPUT"
          echo "versions=$(echo "$VERSIONS" | jq -c .)" >> "$GITHUB_OUTPUT"
          echo "pr_number=${PR_NUM:-}" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Create + push tags on merge commit
        if: steps.parse.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          TAGS='${{ steps.parse.outputs.tags }}'
          SHA="${{ github.sha }}"

          for tag in $(echo "$TAGS" | jq -r '.[]'); do
            if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
              # `git tag -a` creates an annotated tag with its own object SHA,
              # distinct from the commit it points to. Peel with ^{commit} to
              # compare the actual target commit, not the tag-object SHA.
              existing_sha=$(git rev-parse "refs/tags/$tag^{commit}") || {
                echo "::error::Tag $tag exists but does not resolve to a commit."
                exit 1
              }
              if [[ "$existing_sha" == "$SHA" ]]; then
                echo "Tag $tag already points to $SHA — skipping (idempotent rerun)."
                continue
              fi
              echo "::error::Tag $tag exists at $existing_sha, expected $SHA."
              echo "::error::Refusing to retarget a release tag automatically."
              echo "::error::If Stage 2 hasn't started: delete the bad tag (\`git push origin :refs/tags/$tag\`) and rerun post-release."
              echo "::error::If anything was already published to npm: cut a new patch release instead of moving the tag."
              exit 1
            fi
            git tag -a "$tag" "$SHA" -m "Release $tag (commit $SHA)"
            git push origin "refs/tags/$tag"
            echo "Created + pushed tag $tag -> $SHA"
          done

      - name: Build Stage 2 handoff message
        if: steps.parse.outputs.skip != 'true'
        id: handoff
        run: |
          PACKAGES='${{ steps.parse.outputs.packages }}'
          TAGS='${{ steps.parse.outputs.tags }}'
          SECPUB_OWNER="databricks"
          SECPUB_REPO="secure-public-registry-releases-eng"
          UI_LINK="${GITHUB_SERVER_URL}/${SECPUB_OWNER}/${SECPUB_REPO}/actions/workflows/neon-js.yml"

          {
            echo "body<<HANDOFF_EOF"
            echo "## 🚀 Tagged — ready for Stage 2 (npm publish)"
            echo ""
            echo "Release tagged on commit [\`${GITHUB_SHA:0:7}\`](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA})."
            echo ""
            echo "### ⚠️ Publish order (leaf first)"
            echo ""
            echo "Dispatch Stage 2 one package at a time, **in the order listed below**. Each downstream package's published tarball references its dependency's version — that dependency must already be on npm when the dependent publishes, or consumers will hit \`npm install\` failures."
            echo ""
            # Ordered overview list (e.g. "1. auth-ui → auth-ui@v0.1.0-alpha.12").
            i=1
            paste <(echo "$PACKAGES" | jq -r '.[]') <(echo "$TAGS" | jq -r '.[]') \
            | while IFS=$'\t' read -r pkg tag; do
                echo "${i}. \`@neondatabase/${pkg}\` → \`${tag}\`"
                i=$((i+1))
              done
            echo ""
            echo "---"
            echo ""
            # Per-package sections (CLI + UI), same order.
            i=1
            paste <(echo "$PACKAGES" | jq -r '.[]') <(echo "$TAGS" | jq -r '.[]') \
            | while IFS=$'\t' read -r pkg tag; do
                echo "### ${i}. \`@neondatabase/${pkg}\` → \`${tag}\`"
                echo ""
                echo "**CLI** (one-liner):"
                echo '```bash'
                echo "gh workflow run -R ${SECPUB_OWNER}/${SECPUB_REPO} neon-js.yml \\"
                echo "  -f package=${pkg} \\"
                echo "  -f ref=${tag} \\"
                echo "  -f dry-run=false"
                echo '```'
                echo ""
                echo "**UI:** [Dispatch \`neon-js.yml\`](${UI_LINK}) — fill in the form with \`package=${pkg}\`, \`ref=${tag}\`, untick \`dry-run\`."
                echo ""
                echo "**Wait until this run finishes successfully before dispatching the next package.**"
                echo ""
                i=$((i+1))
              done
            echo "---"
            echo ""
            echo "**If anything's wrong before Stage 2 runs:** delete the bad tag(s) manually (\`git push origin :refs/tags/<pkg>@v<ver>\`) and rerun post-release."
            echo ""
            echo "**If anything's wrong after Stage 2 publishes:** npm versions are immutable, so cut a new patch release with the fix — do NOT try to revert the release commit (npm will reject republishing the same version)."
            echo "HANDOFF_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Write handoff to workflow summary
        if: steps.parse.outputs.skip != 'true'
        run: |
          cat <<'SUMMARY_EOF' >> "$GITHUB_STEP_SUMMARY"
          ${{ steps.handoff.outputs.body }}
          SUMMARY_EOF

      - name: Post handoff as PR comment
        if: steps.parse.outputs.skip != 'true' && steps.parse.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUM: ${{ steps.parse.outputs.pr_number }}
        run: |
          # Use a heredoc via gh CLI --body-file to preserve formatting.
          BODY_FILE=$(mktemp)
          cat <<'BODY_EOF' > "$BODY_FILE"
          ${{ steps.handoff.outputs.body }}
          BODY_EOF
          gh pr comment "$PR_NUM" --body-file "$BODY_FILE"
          rm -f "$BODY_FILE"
