name: Release

# CI-based release workflow. This is the only supported release implementation;
# local release scripts only print guidance to use this workflow.
#
# What this does:
#   1. Computes the cascade of packages to release (BFS over dependency graph)
#   2. Builds all workspace packages before any version changes
#   3. Bumps the version of each package in order
#       - All packages in the cascade get the same bump type
#         (e.g. a major bump on auth cascades as major to neon-js too,
#          preserving the semver contract for consumers of neon-js)
#   4. Refreshes bun.lock with the bumped workspace versions
#   5. Rebuilds packages from the final bumped versions
#   6. Packs the exact tarballs that will be published and generates CycloneDX SBOMs
#   7. Creates GitHub artifact attestations for provenance and SBOMs
#   8. Creates version tags from the final lockfile commit state
#   9. Pushes version commits and tags
#   10. Publishes each package from the attested tarballs
#
# Prerequisites:
#   - NPM_TOKEN secret: granular access token from npmjs.com with publish scope
#     for all @neondatabase/* packages

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to release'
        required: true
        type: choice
        options:
          - auth
          - auth-ui
          - postgrest-js
          - neon-js
      bump:
        description: 'Version bump type (applied to all packages in the cascade)'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

permissions:
  contents: write # push version bump commits and tags
  id-token: write # artifact attestations via OIDC
  attestations: write # persist attestations to GitHub
  artifact-metadata: write # create storage records for attested artifacts

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    environment: production
    runs-on:
      group: neondatabase-protected-runner-group
      labels: linux-ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0 # bumpp needs full tag history to compute next version

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Compute the ordered list of packages to release.
      # Dependency graph:
      #   postgrest-js -> neon-js
      #   auth-ui -> auth -> neon-js
      #   auth -> neon-js
      - name: Compute release cascade
        id: cascade
        run: |
          case "${{ inputs.package }}" in
            postgrest-js) packages='["postgrest-js","neon-js"]' ;;
            auth-ui)      packages='["auth-ui","auth","neon-js"]' ;;
            auth)         packages='["auth","neon-js"]' ;;
            neon-js)      packages='["neon-js"]' ;;
          esac
          echo "packages=$packages" >> "$GITHUB_OUTPUT"
          echo "Release cascade: $packages" >> "$GITHUB_STEP_SUMMARY"

      - name: Build workspace packages
        run: bun run build

      - name: Bump versions
        run: |
          packages='${{ steps.cascade.outputs.packages }}'
          for pkg in $(echo "$packages" | jq -r '.[]'); do
            echo "::group::$pkg"

            echo "Bumping version for @neondatabase/$pkg..."

            cd "$GITHUB_WORKSPACE/packages/$pkg"
            bunx bumpp \
              --release "${{ inputs.bump }}" \
              --no-tag \
              --commit "chore: release $pkg@v%s" \
              --no-push \
              --yes
            cd "$GITHUB_WORKSPACE"

            echo "::endgroup::"
          done

      - name: Update lockfile
        run: |
          bun install
          if ! git diff --quiet bun.lock; then
            git add bun.lock
            git commit -m "chore: update lock file"
          fi

      - name: Rebuild workspace packages with bumped versions
        run: bun run build

      - name: Prepare release artifacts
        run: |
          packages='${{ steps.cascade.outputs.packages }}'
          for pkg in $(echo "$packages" | jq -r '.[]'); do
            version=$(jq -r '.version' "$GITHUB_WORKSPACE/packages/$pkg/package.json")

            echo "::group::$pkg"
            echo "Preparing attested release artifacts for @neondatabase/$pkg@$version..."

            artifact_dir="$GITHUB_WORKSPACE/release-artifacts/$pkg"
            mkdir -p "$artifact_dir"

            cd "$GITHUB_WORKSPACE/packages/$pkg"
            bun pm pack \
              --filename "$artifact_dir/package.tgz"
            cd "$GITHUB_WORKSPACE"

            bun scripts/generate-release-sbom.ts \
              "$pkg" \
              "$artifact_dir/sbom.cdx.json"

            {
              echo "### @neondatabase/$pkg@$version"
              echo "- tarball: \`release-artifacts/$pkg/package.tgz\`"
              echo "- sbom: \`release-artifacts/$pkg/sbom.cdx.json\`"
            } >> "$GITHUB_STEP_SUMMARY"

            echo "::endgroup::"
          done

      - name: Attest auth provenance
        if: contains(fromJSON(steps.cascade.outputs.packages), 'auth')
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: ${{ github.workspace }}/release-artifacts/auth/package.tgz

      - name: Attest auth SBOM
        if: contains(fromJSON(steps.cascade.outputs.packages), 'auth')
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: ${{ github.workspace }}/release-artifacts/auth/package.tgz
          sbom-path: ${{ github.workspace }}/release-artifacts/auth/sbom.cdx.json

      - name: Attest auth-ui provenance
        if: contains(fromJSON(steps.cascade.outputs.packages), 'auth-ui')
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: ${{ github.workspace }}/release-artifacts/auth-ui/package.tgz

      - name: Attest auth-ui SBOM
        if: contains(fromJSON(steps.cascade.outputs.packages), 'auth-ui')
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: ${{ github.workspace }}/release-artifacts/auth-ui/package.tgz
          sbom-path: ${{ github.workspace }}/release-artifacts/auth-ui/sbom.cdx.json

      - name: Attest postgrest-js provenance
        if: contains(fromJSON(steps.cascade.outputs.packages), 'postgrest-js')
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: ${{ github.workspace }}/release-artifacts/postgrest-js/package.tgz

      - name: Attest postgrest-js SBOM
        if: contains(fromJSON(steps.cascade.outputs.packages), 'postgrest-js')
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: ${{ github.workspace }}/release-artifacts/postgrest-js/package.tgz
          sbom-path: ${{ github.workspace }}/release-artifacts/postgrest-js/sbom.cdx.json

      - name: Attest neon-js provenance
        if: contains(fromJSON(steps.cascade.outputs.packages), 'neon-js')
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: ${{ github.workspace }}/release-artifacts/neon-js/package.tgz

      - name: Attest neon-js SBOM
        if: contains(fromJSON(steps.cascade.outputs.packages), 'neon-js')
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: ${{ github.workspace }}/release-artifacts/neon-js/package.tgz
          sbom-path: ${{ github.workspace }}/release-artifacts/neon-js/sbom.cdx.json

      - name: Create version tags
        run: |
          packages='${{ steps.cascade.outputs.packages }}'
          for pkg in $(echo "$packages" | jq -r '.[]'); do
            version=$(jq -r '.version' "$GITHUB_WORKSPACE/packages/$pkg/package.json")
            git tag "$pkg-v$version"
          done

      - name: Push commits and tags
        run: git push --follow-tags

      - name: Publish packages
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          packages='${{ steps.cascade.outputs.packages }}'
          for pkg in $(echo "$packages" | jq -r '.[]'); do
            echo "Publishing @neondatabase/$pkg..."
            bun publish \
              --tag latest \
              "$GITHUB_WORKSPACE/release-artifacts/$pkg/package.tgz"
          done
          rm -f ~/.npmrc
